<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f6f3e8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Perfect Places" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta
      name="description"
      content="The Map of Tiny Perfect Things - discover crowd-sourced cafes, food spots, and tiny gems."
    />
    <meta
      name="keywords"
      content="map, recommendations, cafes, restaurants, hidden gems, crowdsourced"
    />
    <meta name="author" content="Dea and Harsh" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Map of Tiny Perfect Things" />
    <meta
      property="og:description"
      content="Discover and submit tiny perfect places with no-login forms and no-login chat."
    />
    <meta property="og:image" content="%PUBLIC_URL%/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Map of Tiny Perfect Things" />
    <meta
      name="twitter:description"
      content="Discover and submit tiny perfect places with no-login forms and no-login chat."
    />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo.png" />

    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://b.basemaps.cartocdn.com" />
    <link rel="preconnect" href="https://c.basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Perfect Places - The Map of Tiny Perfect Things</title>

    <style>
      html,
      body,
      #root {
        width: 100%;
        min-height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        background: #f6f3e8;
        overflow-x: hidden;
      }

      #root:empty {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f6f3e8;
      }

      #root:empty::after {
        content: 'Loading map...';
        font-family: monospace;
        color: #5e5a50;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Hidden Netlify Forms (required for static form detection) -->
    <form
      name="place-submissions"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="text" name="contributor_name" />
      <input type="email" name="contributor_email" />
      <input type="text" name="place_name" />
      <input type="text" name="location" />
      <input type="text" name="city" />
      <input type="text" name="state" />
      <input type="text" name="country" />
      <input type="text" name="category" />
      <input type="text" name="google_maps_link" />
      <input type="text" name="notes" />
      <input type="text" name="creator_access_code" />
      <input type="text" name="creators_rec_requested" />
      <input type="text" name="bot-field" />
    </form>

    <form
      name="feature-requests"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="text" name="requester_name" />
      <input type="email" name="requester_email" />
      <input type="text" name="summary" />
      <input type="text" name="problem" />
      <input type="text" name="proposal" />
      <input type="text" name="component" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
