name: Auto Sync Place Submissions

on:
  schedule:
    # Run once daily (cron doesn't support 26h intervals; daily is the closest)
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-sync-place-submissions
  cancel-in-progress: false

jobs:
  sync-submissions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Preflight secrets check
        id: preflight
        run: |
          if [ -z "${{ secrets.NETLIFY_ACCESS_TOKEN }}" ] || [ -z "${{ secrets.NETLIFY_SITE_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping sync because NETLIFY_ACCESS_TOKEN or NETLIFY_SITE_ID is missing."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run automated ingestion
        id: ingest
        if: steps.preflight.outputs.ready == 'true'
        env:
          NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          CREATOR_ACCESS_CODES: ${{ secrets.CREATOR_ACCESS_CODES }}
        run: |
          python data_creation/auto_ingest_submissions.py

      - name: Read ingest report
        id: report
        if: steps.preflight.outputs.ready == 'true'
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          from pathlib import Path

          report = json.loads(Path("data_creation/last_ingest_report.json").read_text(encoding="utf-8"))
          added = int(report.get('added_rows', 0))
          print(f"new_unique_submissions={int(report.get('new_unique_submissions', 0))}")
          print(f"added_rows={added}")
          print(f"creator_overrides_applied={int(report.get('creator_overrides_applied', 0))}")

          # Build a contributor-attributed markdown body for the PR.
          # We deliberately exclude contributor_email — that stays private in
          # the place_submissions.csv on the merged branch.
          body_lines = []
          for entry in report.get("additions", []):
              name = entry.get("name") or "Unknown"
              cat = entry.get("type2") or "other"
              body_lines.append(f"#### {name} — {cat}")
              loc_parts = [entry.get("location"), entry.get("city"),
                           entry.get("state"), entry.get("country")]
              loc = ", ".join(p for p in loc_parts if p)
              if loc:
                  body_lines.append(f"- **Location:** {loc}")
              contrib = entry.get("contributor_name")
              if contrib:
                  body_lines.append(f"- **Contributor:** {contrib}")
              submitted = entry.get("submitted_at")
              if submitted:
                  # Show only the date portion (the ISO timestamp is noisy).
                  body_lines.append(f"- **Submitted:** {submitted[:10]}")
              notes = entry.get("notes")
              if notes:
                  body_lines.append(f"- **Why special:** {notes}")
              gmap = entry.get("google_maps_link")
              if gmap:
                  body_lines.append(f"- **Google Maps:** {gmap}")
              body_lines.append("")

          change_list = "\n".join(body_lines).rstrip()
          if not change_list and added > 0:
              # Fallback for the case where additions list is missing (older runs)
              change_list = f"- {added} new place(s) added"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"change_list<<CHANGELIST_EOF\n{change_list}\nCHANGELIST_EOF\n")
          PY

      - name: Create pull request
        id: create_pr
        if: steps.preflight.outputs.ready == 'true' && steps.report.outputs.added_rows != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/auto-place-submission-sync
          delete-branch: true
          commit-message: "chore(data): auto-sync place submissions"
          title: "chore(data): auto-sync ${{ steps.report.outputs.added_rows }} new place submission(s)"
          body: |
            Automated sync from Netlify place submissions.

            **New submissions:** ${{ steps.report.outputs.new_unique_submissions }}
            **Added to dataset:** ${{ steps.report.outputs.added_rows }}
            **Creator overrides:** ${{ steps.report.outputs.creator_overrides_applied }}

            ### Places added

            ${{ steps.report.outputs.change_list }}

            ---
            *Pipeline: fetch → de-duplicate → enrich via Google Places API → update master data → refresh city docs*
          labels: |
            automated
            data
          add-paths: |
            data_creation/place_submissions.csv
            data_creation/last_ingest_report.json
            master_data/master_data.csv
            master_data/master_data.json
            master_data/city_files/*.txt
            map/src/master_data.json

      - name: Email maintainers on new submissions
        if: steps.preflight.outputs.ready == 'true' && steps.report.outputs.added_rows != '0'
        continue-on-error: true
        env:
          SMTP_SERVER: ${{ secrets.NOTIFY_SMTP_SERVER }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.NOTIFY_SMTP_SERVER }}
          server_port: ${{ secrets.NOTIFY_SMTP_PORT }}
          username: ${{ secrets.NOTIFY_SMTP_USERNAME }}
          password: ${{ secrets.NOTIFY_SMTP_PASSWORD }}
          subject: "[MTPT] ${{ steps.report.outputs.added_rows }} new place submission(s) ingested"
          to: hvsc1708@gmail.com, dea.bardhoshi@berkeley.edu
          from: ${{ secrets.NOTIFY_SMTP_FROM }}
          body: |
            The auto-sync workflow ingested new place submissions.

            New unique submissions: ${{ steps.report.outputs.new_unique_submissions }}
            Added rows to dataset: ${{ steps.report.outputs.added_rows }}
            Creator overrides applied: ${{ steps.report.outputs.creator_overrides_applied }}

            Pull request: ${{ steps.create_pr.outputs.pull-request-url }}
            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
